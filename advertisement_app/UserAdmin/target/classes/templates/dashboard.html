<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
    <link rel="stylesheet" th:href="@{/css/dashboard-user-card.css}">
    <link rel="stylesheet" th:href="@{/css/shared.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@radix-ui/react-icons/dist/index.css">
    <title>Admin Users</title>
    <script th:src="@{/js/dashboard.js}"></script>
</head>

<body>

    <!-- User Details Cards (outside table) -->
    <div th:each="user : ${users}">
        <div class="dashboard-user-card" th:id="'user-card-' + ${user.id}" th:data-lat='${user.latitude}' th:data-long='${user.longitude}'>

            <div class="overlay"></div>

            <div class="card">
                <div class="card-header">
                    <div class="card-header-left">
                        <img th:src="${user.logoUrl}" alt="User Logo" class="avatar">
                        <h2 th:text="${user.username}"></h2>
                    </div>
                    <div class="card-header-right">
                        <button class="btn-close-circular" aria-label="Close"
                                th:data-user-id='${user.id}'
                                onclick='handleClose(this.dataset.userId)'>
                            <svg
                                    viewBox="0 0 15 15"
                                    xmlns="http://www.w3.org/2000/svg"
                                    class="icon-cross">
                                <path
                                        d="M11.1 4.05L10.05 3 7.05 6 4.05 3 3 4.05 6 7.05
                                               3 10.05 4.05 11.1 7.05 8.1 10.05 11.1 11.1 10.05
                                               8.1 7.05 11.1 4.05Z"
                                        fill="currentColor"
                                />
                            </svg>
                        </button>
                    </div>

                </div>

                <div class="card-body">
                    <div class="info-row">
                        <span class="label">Full Name:</span>
                        <span class="value" th:text="${user.firstName + ' ' + user.lastName}"></span>
                    </div>
                    <div class="info-row">
                        <span class="label">Phone:</span>
                        <span class="value" th:text="${user.phoneNumber}"></span>
                    </div>
                    <div class="info-row">
                        <span class="label">WhatsApp:</span>
                        <span class="value" th:text="${user.whatsappNumber}"></span>
                    </div>
                    <div class="info-row">
                        <span class="label">Rank:</span>
                        <span class="value" th:text="${user.rank}"></span>
                    </div>
                    <div class="info-row">
                        <span class="label" >Location:</span>
                        <span class="value" th:id="'location-' + ${user.id}"></span>
                    </div>
                    <div class="info-row">
                        <span class="label">Account Locked:</span>
                        <span class="value" th:text="${!user.accountNonLocked}"></span>
                    </div>
                    <div class="info-row">
                        <span class="label">Enabled:</span>
                        <span class="value" th:text="${user.isEnabled}"></span>
                    </div>
                    <div class="info-row">
                        <span class="label">Last Login:</span>
                        <span class="value" th:text="${user.lastLogin}"></span>
                    </div>
                    <div class="info-row">
                        <span class="label">Login Attempts:</span>
                        <span class="value" th:text="${user.loginAttempts}"></span>
                    </div>
                    <div class="info-row">
                        <span class="label">Created At:</span>
                        <span class="value" th:text="${user.createdAt}"></span>
                    </div>
                    <div class="info-row">
                        <span class="label">Created By:</span>
                        <span class="value" th:text="${user.createdBy}"></span>
                    </div>
                    <div class="info-row">
                        <span class="label">Updated At:</span>
                        <span class="value" th:text="${user.updatedAt}"></span>
                    </div>
                    <div class="info-row">
                        <span class="label">Updated By:</span>
                        <span class="value" th:text="${user.updatedBy}"></span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Table -->
    <div class="table-wrapper">

        <table class="user-table" >
            <thead>
            <tr>
                <th>Full Name</th>
                <th>Username</th>
                <th>Status</th>
                <th>Roles</th>
                <th>Created At</th>
                <th>Last Login</th>
                <th>Actions</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="user : ${users}">
                <!-- Full Name + Avatar -->
                <td>
                    <div class="user-cell">
                        <img th:src="${user.logoUrl}" class="avatar">
                        <span th:text="${user.fullName}"></span>
                    </div>
                </td>

                <td th:text="${user.username}"></td>

                <!-- Status badge -->
                <td>
                            <span th:text="${user.isEnabled ? 'Enabled' : 'Disabled'}"
                                  th:class="'status-badge ' + (${user.isEnabled} ? 'enabled' : 'disabled')">
                            </span>
                </td>

                <td th:text="${#strings.arrayJoin(user.roleNameList, ', ')}"></td>
                <td th:text="${user.createdAt}"></td>
                <td th:text="${user.lastLogin}"></td>

                <!-- Action icons -->
                <td class="actions">
                    <button th:data-user-id='${user.id}'
                            onclick="handleViewDetails(this.dataset.userId)"
                            class="icon-btn left"
                            id='view-btn-${this.dataset.userId}'
                    >
                        <svg
                                viewBox="0 0 15 15"
                                xmlns="http://www.w3.org/2000/svg"
                                class="icon-cross">
                            <path d="M7.49991 0.876892C3.84222 0.876892 0.877075 3.84204 0.877075 7.49972C0.877075 11.1574 3.84222 14.1226 7.49991 14.1226C11.1576 14.1226 14.1227 11.1574 14.1227 7.49972C14.1227 3.84204 11.1576 0.876892 7.49991 0.876892ZM1.82707 7.49972C1.82707 4.36671 4.36689 1.82689 7.49991 1.82689C10.6329 1.82689 13.1727 4.36671 13.1727 7.49972C13.1727 10.6327 10.6329 13.1726 7.49991 13.1726C4.36689 13.1726 1.82707 10.6327 1.82707 7.49972ZM8.24992 4.49999C8.24992 4.9142 7.91413 5.24999 7.49992 5.24999C7.08571 5.24999 6.74992 4.9142 6.74992 4.49999C6.74992 4.08577 7.08571 3.74999 7.49992 3.74999C7.91413 3.74999 8.24992 4.08577 8.24992 4.49999ZM6.00003 5.99999H6.50003H7.50003C7.77618 5.99999 8.00003 6.22384 8.00003 6.49999V9.99999H8.50003H9.00003V11H8.50003H7.50003H6.50003H6.00003V9.99999H6.50003H7.00003V6.99999H6.50003H6.00003V5.99999Z" fill="currentColor" fill-rule="evenodd" clip-rule="evenodd"></path>
                        </svg>
                    </button>

                    <form th:action="@{'/admin/v0/users/disable?userId=' + ${user.id}}" method="post" class="center">
                        <button class="icon-btn disable-btn" type="submit">
                            <svg  viewBox="0 0 15 15"  class="icon-cross" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M5.5 1C5.22386 1 5 1.22386 5 1.5C5 1.77614 5.22386 2 5.5 2H9.5C9.77614 2 10 1.77614 10 1.5C10 1.22386 9.77614 1 9.5 1H5.5ZM3 3.5C3 3.22386 3.22386 3 3.5 3H5H10H11.5C11.7761 3 12 3.22386 12 3.5C12 3.77614 11.7761 4 11.5 4H11V12C11 12.5523 10.5523 13 10 13H5C4.44772 13 4 12.5523 4 12V4L3.5 4C3.22386 4 3 3.77614 3 3.5ZM5 4H10V12H5V4Z" fill="currentColor" fill-rule="evenodd" clip-rule="evenodd"></path>
                            </svg>
                        </button>
                    </form>

                    <form th:action="@{'/admin/v0/users/enable?userId=' + ${user.id}}" method="post" class="right">
                        <button class="icon-btn enable-btn" type="submit">
                            <svg viewBox="0 0 15 15" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M7.49991 0.877045C3.84222 0.877045 0.877075 3.84219 0.877075 7.49988C0.877075 11.1575 3.84222 14.1227 7.49991 14.1227C11.1576 14.1227 14.1227 11.1575 14.1227 7.49988C14.1227 3.84219 11.1576 0.877045 7.49991 0.877045ZM1.82708 7.49988C1.82708 4.36686 4.36689 1.82704 7.49991 1.82704C10.6329 1.82704 13.1727 4.36686 13.1727 7.49988C13.1727 10.6329 10.6329 13.1727 7.49991 13.1727C4.36689 13.1727 1.82708 10.6329 1.82708 7.49988ZM10.1589 5.53774C10.3178 5.31191 10.2636 5.00001 10.0378 4.84109C9.81194 4.68217 9.50004 4.73642 9.34112 4.96225L6.51977 8.97154L5.35681 7.78706C5.16334 7.59002 4.84677 7.58711 4.64973 7.78058C4.45268 7.97404 4.44978 8.29061 4.64325 8.48765L6.22658 10.1003C6.33054 10.2062 6.47617 10.2604 6.62407 10.2483C6.77197 10.2363 6.90686 10.1591 6.99226 10.0377L10.1589 5.53774Z" fill="currentColor" fill-rule="evenodd" clip-rule="evenodd"></path></svg>
                        </button>
                    </form>

                </td>
            </tr>
            </tbody>
        </table>

        <div class="page-container">
            <div class="left">
                <label for="pageDropdown">Rows per page</label>
                <!--                here we should get from the session storage the page-->
                <select id="pageDropdown" name="pageDropdown">
                    <option value="3">3</option>
                    <option value="5">5</option>
                    <option value="6">6</option>
                </select>
                <p th:data-total-rows="${totalRows}" id="total-rows">of <span th:text="${totalRows}" ></span></p>
            </div>

            <div class="right" >
                <div class="pagination"  id="page-container-right-pagination" th:data-total-pages = ${totalPages}>
                    <button class="arrow pagination-btn" onclick="goToPage('first')">«</button>
                    <button class="arrow pagination-btn" onclick="goToPage('prev')">‹</button>
                    <button class="pagination-btn" id="pagination-btn-0" onclick="goToPage(0)">1</button>
                    <button class="pagination-btn" id="pagination-btn-1" onclick="goToPage(1)">2</button>
                    <button class="pagination-btn" id="pagination-btn-2" onclick="goToPage(2)">3</button>
                    <button class="pagination-btn-disable" disabled>...</button>
                    <button class="pagination-btn" id="pagination-btn-5" onclick="goToPage(5) ">6</button>
                    <button class="arrow pagination-btn" onclick="goToPage('next')">›</button>
                    <button class="arrow pagination-btn" onclick="goToPage('last')">»</button>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
