# Root logging
logging.level.root=INFO

# AWS SDK core
logging.level.software.amazon.awssdk=DEBUG

# Request lifecycle (signing, retries, response)
logging.level.software.amazon.awssdk.request=TRACE

# HTTP client (connections, timeouts)
logging.level.software.amazon.awssdk.http=DEBUG

# Apache HTTP client (used internally)
logging.level.org.apache.http=INFO
